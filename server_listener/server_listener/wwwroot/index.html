<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель мониторинга системных логов</title>
    
    <!-- ФАВИКОН: Подключаем прозрачный PNG -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Дополнительные стили -->
    <style>
        /* Скроллы */
        html, body { overflow-x: auto; overflow-y: auto; min-height: 100vh; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #dc3545; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #bb2d3b; }

        /* Ограничение ширины страницы */
        .main-wrapper { max-width: 1600px; margin: 0 auto; padding: 0 15px; width: 100%; }

        /* Панель фильтров */
        .filter-scroll { overflow-x: auto; overflow-y: visible; }

        /* Индикатор статуса (зеленая/красная точка) */
        #status-indicator {
            display: inline-block;
            width: 14px; height: 14px;
            border-radius: 50%;
            background-color: #198754; /* Зеленый по умолчанию */
            margin-right: 8px;
            border: 2px solid #fff;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        #status-indicator.offline { background-color: #dc3545; }

        /* Окошко ошибок (под таблицей) */
        #error-wrapper {
            border: 1px solid #dee2e6;
            border-radius: 6px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        #error-header {
            background-color: #e9ecef;
            padding: 8px 15px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #error-container {
            background-color: #f8f9fa;
            min-height: 60px;
            max-height: 200px;
            overflow-y: auto;
            overflow-x: auto;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            position: relative;
        }
        /* Состояние "Нет ошибок" */
        #error-container .empty-state {
            display: flex; align-items: center; justify-content: center;
            height: 100%; width: 100%; color: #6c757d; font-weight: 500;
            position: absolute; top: 0; left: 0;
        }
        #error-container.has-errors .empty-state { display: none; }
        #error-container .error-line {
            padding: 2px 0; color: #dc3545;
            border-bottom: 1px solid #eee;
        }
        #error-container .error-line:last-child { border-bottom: none; }
        .error-time { color: #495057; font-weight: bold; }

        /* Кнопки экспорта и сброса */
        .action-buttons { display: flex; gap: 10px; width: 100%; }
        @media (min-width: 768px) {
            .action-buttons { flex-wrap: nowrap; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="container-fluid mt-4 px-0">
            
            <!-- Верхняя часть: Логотип (слева) + Статус (справа) -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <img src="logo_full.png" alt="Beacon Logo" style="height: 80px; width: auto;">
                <div class="d-flex align-items-center text-muted small">
                    <span id="status-indicator"></span>
                    Статус: <span id="status-text" class="ms-1 fw-bold text-success">Онлайн</span>
                </div>
            </div>

            <!-- ДАШБОРД (Статистика) -->
            <div class="row g-3 mb-4">
                <div class="col-md-3 col-6">
                    <div class="card bg-primary text-white p-3 shadow-sm">
                        <small>Всего записей</small>
                        <h3 class="mb-0" id="stat-total">0</h3>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="card bg-danger text-white p-3 shadow-sm">
                        <small>Ошибки</small>
                        <h3 class="mb-0" id="stat-errors">0</h3>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="card bg-warning text-dark p-3 shadow-sm">
                        <small>Предупреждения</small>
                        <h3 class="mb-0" id="stat-warnings">0</h3>
                    </div>
                </div>
                <!-- Статистика Информации (зеленый цвет) -->
                <div class="col-md-3 col-6">
                    <div class="card bg-success text-white p-3 shadow-sm">
                        <small>Информация</small>
                        <h3 class="mb-0" id="stat-infos">0</h3>
                    </div>
                </div>
            </div>

            <!-- ФИЛЬТРЫ -->
            <div class="card bg-light p-3 mb-4 filter-scroll">
                <div class="row g-3 align-items-end" style="min-width: 700px;">
                    <div class="col-md-2">
                        <label for="eventTypeFilter" class="form-label">Тип события:</label>
                        <select id="eventTypeFilter" class="form-select">
                            <option value="">Все</option>
                            <option value="Log">Log</option>
                            <option value="Error">Error</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="sourceFilter" class="form-label">Источник:</label>
                        <select id="sourceFilter" class="form-select">
                            <option value="">Все</option>
                            <option value="Application">Application</option>
                            <option value="System">System</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="logNameFilter" class="form-label">Журнал:</label>
                        <select id="logNameFilter" class="form-select">
                            <option value="">Все</option>
                            <option value="Application">Application</option>
                            <option value="System">System</option>
                            <option value="Security">Security</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="searchFilter" class="form-label">Поиск по сообщению:</label>
                        <input type="text" id="searchFilter" class="form-control" placeholder="Введите текст...">
                    </div>
                    <div class="col-md-1">
                        <label for="sortOrder" class="form-label">Порядок:</label>
                        <select id="sortOrder" class="form-select">
                            <option value="desc">Новые</option>
                            <option value="asc">Старые</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <div class="action-buttons">
                            <button id="applyFilters" class="btn btn-danger w-100">Применить</button>
                            <button id="resetFilters" class="btn btn-secondary w-100" title="Сбросить фильтры">↺</button>
                        </div>
                    </div>
                </div>
                <div class="row mt-3 d-flex justify-content-between align-items-center">
                    <div class="col-md-6 col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="autoUpdate">
                            <label class="form-check-label" for="autoUpdate">Автообновление (каждые 15 сек)</label>
                        </div>
                    </div>
                    <div class="col-md-6 col-12 text-end">
                        <button id="exportCSV" class="btn btn-success btn-sm">⬇ Экспорт в CSV</button>
                    </div>
                </div>
            </div>

            <!-- ТАБЛИЦА -->
            <div class="table-responsive">
                <table class="table table-bordered table-hover table-sm">
                    <thead class="table-danger">
                        <tr>
                            <th style="width: 5%;">ID</th>
                            <th style="width: 15%;">Время</th>
                            <th style="width: 10%;">Тип события</th>
                            <th style="width: 10%;">Уровень</th>
                            <th style="width: 10%;">Компьютер</th>
                            <th style="width: 15%;">Источник</th>
                            <th style="width: 10%;">Журнал</th>
                            <th>Сообщение</th>
                        </tr>
                    </thead>
                    <tbody id="logs-table-body" style="cursor: pointer;">
                        <!-- Данные загружаются динамически -->
                    </tbody>
                </table>
            </div>

            <!-- ЖУРНАЛ ОШИБОК (с шапкой и кнопкой очистки) -->
            <div id="error-wrapper">
                <div id="error-header">
                    <span class="fw-bold small">🔴 Журнал системных ошибок</span>
                    <button id="clearErrors" class="btn btn-outline-danger btn-sm py-0">Очистить</button>
                </div>
                <div id="error-container">
                    <div class="empty-state">Нет ошибок</div>
                </div>
            </div>
            
            <!-- ПАГИНАЦИЯ И ВЫБОР КОЛИЧЕСТВА -->
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
                <nav>
                    <ul class="pagination mb-0" id="pagination-controls">
                        <!-- Элементы пагинации генерируются JS -->
                    </ul>
                </nav>
                <div class="d-flex align-items-center mt-2 mt-md-0">
                    <span class="me-2 small text-muted">Показывать по:</span>
                    <select id="itemsPerPage" class="form-select form-select-sm" style="width: 70px;">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО (Подробная информация) -->
    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Детали события <span id="modal-id" class="ms-2 badge bg-light text-dark"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-6"><strong>Время:</strong> <span id="modal-time"></span></div>
                        <div class="col-6"><strong>Компьютер:</strong> <span id="modal-computer"></span></div>
                        <div class="col-6"><strong>Тип события:</strong> <span id="modal-type"></span></div>
                        <div class="col-6"><strong>Уровень:</strong> <span id="modal-level"></span></div>
                        <div class="col-6"><strong>Источник:</strong> <span id="modal-source"></span></div>
                        <div class="col-6"><strong>Журнал:</strong> <span id="modal-logname"></span></div>
                        <div class="col-12 mt-3">
                            <hr>
                            <strong>Полное сообщение:</strong>
                            <p id="modal-message" class="p-3 bg-light rounded border mt-2"></p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Подключаем Bootstrap 5 JS для работы модалки -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // --- 1. ЭМУЛЯЦИЯ ДАННЫХ И ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ (С сохранением в localStorage) ---
        let mockData = [];
        const sources = ['Application', 'System', 'Security'];
        const levels = ['Инфо', 'Предупреждение', 'Ошибка'];
        const messages = [
            'Пользователь вошел в систему', 'Служба запущена успешно', 'Обновление базы данных',
            'Истекло время ожидания запроса', 'Не удалось подключиться к порту 8080', 'Ошибка доступа к файлу',
            'Диск переполнен', 'Синтаксическая ошибка в скрипте', 'Сессия пользователя истекла',
            'Отказ в доступе к реестру', 'Система перезагружена корректно', 'Обнаружено вторжение'
        ];
        
        // Генерация случайных логов с сохранением в localStorage
        function generateMockData(count = 120) {
            // Проверяем, есть ли уже сохраненные данные в браузере
            const savedData = localStorage.getItem('beacon_mock_data');
            if (savedData) {
                return JSON.parse(savedData);
            }

            // Если данных нет — генерируем новые
            const data = [];
            for (let i = 1; i <= count; i++) {
                const level = levels[Math.floor(Math.random() * levels.length)];
                data.push({
                    id: i,
                    time: new Date(Date.now() - Math.random() * 86400000 * 7).toLocaleString(),
                    type: Math.random() > 0.5 ? 'Log' : 'Error',
                    level: level,
                    computer: `WS-${Math.floor(Math.random() * 50) + 1}`,
                    source: sources[Math.floor(Math.random() * sources.length)],
                    logName: sources[Math.floor(Math.random() * sources.length)],
                    message: messages[Math.floor(Math.random() * messages.length)] + ` #${i}`
                });
            }
            
            // Сохраняем в браузер, чтобы при F5 цифры не менялись
            localStorage.setItem('beacon_mock_data', JSON.stringify(data));
            return data;
        }

        let currentData = [];
        let filteredData = [];
        let currentPage = 1;
        let itemsPerPage = 10;
        let isAutoUpdate = false;
        let autoUpdateInterval = null;
        let errorCount = 0;

        // --- 2. ФУНКЦИИ ОТРИСОВКИ И ФИЛЬТРАЦИИ ---

        // Генерация бейджика для уровня (цвет Инфо изменен на зеленый bg-success)
        function getLevelBadge(level) {
            if (level === 'Ошибка') return `<span class="badge bg-danger">${level}</span>`;
            if (level === 'Предупреждение') return `<span class="badge bg-warning text-dark">${level}</span>`;
            if (level === 'Инфо') return `<span class="badge bg-success text-white">${level}</span>`;
            return `<span class="badge bg-secondary">${level}</span>`;
        }

        // Отрисовка таблицы
        function renderTable() {
            const tbody = document.getElementById('logs-table-body');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filteredData.slice(start, end);

            tbody.innerHTML = '';
            if (pageData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted">Логи не найдены</td></tr>`;
            } else {
                pageData.forEach(item => {
                    const row = `
                        <tr data-id="${item.id}">
                            <td>${item.id}</td>
                            <td>${item.time}</td>
                            <td>${item.type}</td>
                            <td>${getLevelBadge(item.level)}</td>
                            <td>${item.computer}</td>
                            <td>${item.source}</td>
                            <td>${item.logName}</td>
                            <td>${item.message.substring(0, 50)}${item.message.length > 50 ? '...' : ''}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            }
            updateStats();
            renderPagination();
        }

        // Обновление статистики в карточках
        function updateStats() {
            const total = filteredData.length;
            const errors = filteredData.filter(d => d.level === 'Ошибка').length;
            const warnings = filteredData.filter(d => d.level === 'Предупреждение').length;
            const infos = filteredData.filter(d => d.level === 'Инфо').length;
            
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-errors').innerText = errors;
            document.getElementById('stat-warnings').innerText = warnings;
            document.getElementById('stat-infos').innerText = infos;
        }

        // Пагинация и "Показывать по N"
        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            const controls = document.getElementById('pagination-controls');
            controls.innerHTML = '';

            if (totalPages <= 1) return;

            // Кнопка "Назад"
            const prevLi = document.createElement('li');
            prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
            prevLi.innerHTML = `<a class="page-link" href="#" data-page="${currentPage - 1}">Назад</a>`;
            controls.appendChild(prevLi);

            // Номера страниц
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    const li = document.createElement('li');
                    li.className = `page-item ${i === currentPage ? 'active' : ''}`;
                    li.innerHTML = `<a class="page-link" href="#" data-page="${i}">${i}</a>`;
                    controls.appendChild(li);
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    const li = document.createElement('li');
                    li.className = 'page-item disabled';
                    li.innerHTML = `<span class="page-link">…</span>`;
                    controls.appendChild(li);
                }
            }

            // Кнопка "Вперед"
            const nextLi = document.createElement('li');
            nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
            nextLi.innerHTML = `<a class="page-link" href="#" data-page="${currentPage + 1}">Вперед</a>`;
            controls.appendChild(nextLi);

            // События клика на пагинацию
            controls.querySelectorAll('.page-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = parseInt(e.target.dataset.page);
                    if (page >= 1 && page <= totalPages) {
                        currentPage = page;
                        renderTable();
                    }
                });
            });
        }

        function applyFilters() {
            const type = document.getElementById('eventTypeFilter').value;
            const source = document.getElementById('sourceFilter').value;
            const logName = document.getElementById('logNameFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();
            const sort = document.getElementById('sortOrder').value;

            filteredData = currentData.filter(item => {
                const matchType = !type || item.type === type;
                const matchSource = !source || item.source === source;
                const matchLog = !logName || item.logName === logName;
                const matchSearch = !search || item.message.toLowerCase().includes(search) || item.computer.toLowerCase().includes(search);
                return matchType && matchSource && matchLog && matchSearch;
            });

            // Сортировка
            filteredData.sort((a, b) => {
                const dateA = new Date(a.time.replace(',', ''));
                const dateB = new Date(b.time.replace(',', ''));
                return sort === 'asc' ? dateA - dateB : dateB - dateA;
            });

            currentPage = 1;
            renderTable();
        }

        // --- 3. ФУНКЦИЯ ЭКСПОРТА В CSV ---
        function exportToCSV() {
            if (filteredData.length === 0) {
                addError('[ВНИМАНИЕ] Нет данных для экспорта!');
                return;
            }
            const headers = ['ID', 'Время', 'Тип события', 'Уровень', 'Компьютер', 'Источник', 'Журнал', 'Сообщение'];
            const rows = filteredData.map(row => [
                row.id, row.time, row.type, row.level, row.computer, row.source, row.logName, `"${row.message}"`
            ]);
            const csvContent = [headers, ...rows].map(e => e.join(",")).join("\n");
            
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = `логи_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            URL.revokeObjectURL(url);
            addError('[ИНФО] Экспорт данных в CSV выполнен успешно.');
        }

        // --- 4. МОДАЛЬНОЕ ОКНО И КЛИК ПО СТРОКЕ ---
        function openDetail(id) {
            const item = currentData.find(d => d.id === id);
            if (!item) return;
            document.getElementById('modal-id').innerText = `ID: ${item.id}`;
            document.getElementById('modal-time').innerText = item.time;
            document.getElementById('modal-computer').innerText = item.computer;
            document.getElementById('modal-type').innerText = item.type;
            document.getElementById('modal-level').innerHTML = getLevelBadge(item.level);
            document.getElementById('modal-source').innerText = item.source;
            document.getElementById('modal-logname').innerText = item.logName;
            document.getElementById('modal-message').innerText = item.message;
            
            const myModal = new bootstrap.Modal(document.getElementById('detailModal'));
            myModal.show();
        }

        document.getElementById('logs-table-body').addEventListener('click', (e) => {
            const row = e.target.closest('tr');
            if (row && row.dataset.id) {
                openDetail(parseInt(row.dataset.id));
            }
        });

        // --- 5. ЖУРНАЛ ОШИБОК И АВТООБНОВЛЕНИЕ (Эмуляция ошибок) ---
        function addError(message) {
            const container = document.getElementById('error-container');
            container.classList.add('has-errors');
            
            const time = new Date().toLocaleTimeString();
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-line';
            errorDiv.innerHTML = `<span class="error-time">[${time}]</span> ${message}`;
            container.appendChild(errorDiv);
            
            // Скролл к новой ошибке
            container.scrollTop = container.scrollHeight;
            errorCount++;
            
            // Эмуляция "потери соединения" если ошибок накопилось много
            if (errorCount > 5) {
                document.getElementById('status-indicator').classList.add('offline');
                document.getElementById('status-text').innerText = 'Офлайн';
                document.getElementById('status-text').className = 'ms-1 fw-bold text-danger';
            }
        }

        document.getElementById('clearErrors').addEventListener('click', () => {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="empty-state">Нет ошибок</div>`;
            container.classList.remove('has-errors');
            errorCount = 0;
            // Возвращаем статус онлайн
            document.getElementById('status-indicator').classList.remove('offline');
            document.getElementById('status-text').innerText = 'Онлайн';
            document.getElementById('status-text').className = 'ms-1 fw-bold text-success';
        });

        // Эмуляция добавления ошибок каждые 10 секунд
        let errorInterval = setInterval(() => {
            const errorMessages = [
                '[ERROR] Необработанное исключение в потоке #4',
                '[ERROR] Не удалось найти указанный файл',
                '[ERROR] Таймаут соединения с базой данных',
                '[WARNING] Высокая загрузка процессора (85%)'
            ];
            addError(errorMessages[Math.floor(Math.random() * errorMessages.length)]);
        }, 10000);

        // --- 6. АВТООБНОВЛЕНИЕ ТАБЛИЦЫ (С сохранением в localStorage) ---
        document.getElementById('autoUpdate').addEventListener('change', (e) => {
            isAutoUpdate = e.target.checked;
            if (isAutoUpdate) {
                addError('[ИНФО] Включено автообновление таблицы.');
                autoUpdateInterval = setInterval(() => {
                    // Добавляем новую запись в data
                    const newLog = {
                        id: currentData.length + 1,
                        time: new Date().toLocaleString(),
                        type: 'Log',
                        level: levels[Math.floor(Math.random() * levels.length)],
                        computer: `WS-${Math.floor(Math.random() * 50) + 1}`,
                        source: sources[Math.floor(Math.random() * sources.length)],
                        logName: sources[Math.floor(Math.random() * sources.length)],
                        message: `Новый системный лог #${currentData.length + 1}`
                    };
                    currentData.unshift(newLog); // Добавляем в начало (свежие сверху)
                    
                    // Сохраняем обновленные данные в браузер, чтобы при F5 они не пропали
                    localStorage.setItem('beacon_mock_data', JSON.stringify(currentData));
                    
                    applyFilters(); // Перерисовываем с учетом текущих фильтров
                }, 15000);
            } else {
                clearInterval(autoUpdateInterval);
                addError('[ИНФО] Автообновление таблицы отключено.');
            }
        });

        // --- 7. ОБРАБОТЧИКИ КНОПОК И ИНИЦИАЛИЗАЦИЯ ---
        document.getElementById('applyFilters').addEventListener('click', applyFilters);
        document.getElementById('resetFilters').addEventListener('click', () => {
            document.getElementById('eventTypeFilter').value = '';
            document.getElementById('sourceFilter').value = '';
            document.getElementById('logNameFilter').value = '';
            document.getElementById('searchFilter').value = '';
            document.getElementById('sortOrder').value = 'desc';
            applyFilters();
            addError('[ИНФО] Фильтры были сброшены.');
        });
        document.getElementById('exportCSV').addEventListener('click', exportToCSV);
        
        // Обновление при изменении "Показывать по"
        document.getElementById('itemsPerPage').addEventListener('change', (e) => {
            itemsPerPage = parseInt(e.target.value);
            currentPage = 1;
            renderTable();
        });

        // Инициализация
        currentData = generateMockData(120);
        applyFilters();
        addError('[ИНФО] Панель мониторинга успешно загружена.');
        
        // Симуляция сбоя через 20 секунд для проверки статуса
        setTimeout(() => {
            addError('[КРИТИЧНО] Потеря связи с сервером мониторинга!');
        }, 20000);
    </script>
</body>
</html>
