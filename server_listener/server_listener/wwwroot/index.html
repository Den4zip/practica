<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEACON — Панель мониторинга</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen font-['Inter',system-ui,sans-serif']">

    <div class="max-w-[1400px] mx-auto px-4 py-5">

        <!-- ===== HEADER ===== -->
        <header class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <img src="logo_full.png" alt="BEACON" class="h-10 w-auto">
            </div>
            <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200">
                <span class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_6px_rgba(16,185,129,0.6)]"></span>
                <span class="text-sm font-medium text-gray-700">Статус: <span class="text-emerald-600">Онлайн</span></span>
            </div>
        </header>

        <!-- ===== METRIC CARDS ===== -->
        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="rounded-lg p-5 text-white bg-blue-600 shadow-md">
                <p class="text-sm font-medium opacity-90 mb-1">Всего записей</p>
                <p class="text-4xl font-bold" id="stat-total">0</p>
            </div>
            <div class="rounded-lg p-5 text-white bg-red-600 shadow-md">
                <p class="text-sm font-medium opacity-90 mb-1">Ошибки <span class="text-xs opacity-75">(<span id="stat-errors-count">0</span>)</span></p>
                <p class="text-4xl font-bold" id="stat-errors">0</p>
            </div>
            <div class="rounded-lg p-5 text-white bg-yellow-500 shadow-md">
                <p class="text-sm font-medium opacity-90 mb-1">Предупреждения <span class="text-xs opacity-75">(<span id="stat-warnings-count">0</span>)</span></p>
                <p class="text-4xl font-bold" id="stat-warnings">0</p>
            </div>
            <div class="rounded-lg p-5 text-white bg-emerald-700 shadow-md">
                <p class="text-sm font-medium opacity-90 mb-1">Информация <span class="text-xs opacity-75">(<span id="stat-information-count">0</span>)</span></p>
                <p class="text-4xl font-bold" id="stat-information">0</p>
            </div>
        </section>

        <!-- ===== FILTER PANEL ===== -->
        <section class="bg-white border border-gray-200 rounded-lg p-5 shadow-sm mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-x-4 gap-y-4 items-end">

                <div>
                    <label for="eventTypeFilter" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Тип события:</label>
                    <select id="eventTypeFilter" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white">
                        <option value="">Все</option>
                    </select>
                </div>

                <div>
                    <label for="sourceFilter" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Источник:</label>
                    <select id="sourceFilter" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white">
                        <option value="">Все</option>
                    </select>
                </div>

                <div>
                    <label for="logNameFilter" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Журнал:</label>
                    <select id="logNameFilter" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white">
                        <option value="">Все</option>
                        <option value="Application">Application</option>
                        <option value="System">System</option>
                        <option value="Security">Security</option>
                    </select>
                </div>

                <div>
                    <label for="searchFilter" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Поиск по сообщению:</label>
                    <input type="text" id="searchFilter" placeholder="Введите текст..." class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400">
                </div>

                <div>
                    <label for="sortOrder" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Порядок:</label>
                    <select id="sortOrder" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white">
                        <option value="desc">Новые</option>
                        <option value="asc">Старые</option>
                    </select>
                </div>

            </div>

            <div class="flex flex-wrap items-center justify-between mt-4 gap-3">
                <div class="flex items-center gap-3">
                    <button id="applyFilters" class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-5 py-2 rounded-md transition-colors">Применить</button>
                    <button id="refreshBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-600 border border-gray-300 px-3 py-2 rounded-md transition-colors" title="Обновить">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 9a9 9 0 0116.2-4.2M20 15a9 9 0 01-16.2 4.2"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="flex flex-wrap items-center justify-between mt-4 gap-3">
                <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer select-none">
                    <input type="checkbox" id="autoUpdate" class="rounded border-gray-300 text-blue-600 focus:ring-blue-400">
                    Автообновление (каждые 15 сек)
                </label>
                <button id="exportCsvBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium px-4 py-2 rounded-md transition-colors inline-flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m0 0l-4-4m4 4l4-4"/>
                    </svg>
                    Экспорт в CSV
                </button>
            </div>
        </section>

        <!-- ===== TABLE SECTION ===== -->
        <section id="tableSection" class="bg-white border border-gray-200 rounded-lg shadow-sm">
            <div class="table-scroll-wrapper">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-rose-100">
                            <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200 whitespace-nowrap">ID</th>
                            <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200 whitespace-nowrap">Время</th>
                            <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200 whitespace-nowrap">Тип события</th>
                            <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200 whitespace-nowrap">Уровень</th>
                            <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200 whitespace-nowrap">Компьютер</th>
                            <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200 whitespace-nowrap">Источник</th>
                            <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200 whitespace-nowrap">Журнал</th>
                            <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200 whitespace-nowrap">Сообщение</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <td colspan="8" class="px-3 py-2">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center gap-2 text-sm text-gray-500">
                                        <span class="w-2 h-2 rounded-full bg-red-500 inline-block"></span>
                                        <span>Журнал системных ошибок</span>
                                    </div>
                                    <button id="clearBtn" class="text-xs text-red-600 border border-red-400 rounded px-3 py-1 hover:bg-red-50 transition-colors">Очистить</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                    <tbody id="logs-table-body">
                        <tr>
                            <td colspan="8" class="px-3 py-16 text-center">
                                <p class="text-gray-400 text-sm">Нет записей</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- ===== FOOTER / PAGINATION ===== -->
        <div class="flex flex-wrap items-center justify-end gap-4 mt-4">
            <div class="flex items-center gap-2 text-sm text-gray-600">
                <span>Показывать по:</span>
                <select id="pageSizeSelect" class="border border-gray-300 rounded-md px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
            <nav class="flex items-center gap-1" id="pagination-controls">
                <!-- пагинация рендерится JS -->
            </nav>
        </div>

    </div>

    <!-- Modal detail -->
    <div id="detailOverlay" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 bg-gray-50 rounded-t-xl">
                <h3 class="text-lg font-bold text-gray-800">Детали события <span id="detail-id" class="text-sm font-normal text-gray-500"></span></h3>
                <button id="detailClose" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-1">
                <div class="grid grid-cols-2 gap-x-6 gap-y-4">
                    <div>
                        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Время</p>
                        <p id="detail-time" class="text-sm text-gray-800"></p>
                    </div>
                    <div>
                        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Компьютер</p>
                        <p id="detail-computer" class="text-sm text-gray-800"></p>
                    </div>
                    <div>
                        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Тип события</p>
                        <p id="detail-type" class="text-sm text-gray-800"></p>
                    </div>
                    <div>
                        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Уровень</p>
                        <p id="detail-level" class="text-sm text-gray-800"></p>
                    </div>
                    <div>
                        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Источник</p>
                        <p id="detail-source" class="text-sm text-gray-800"></p>
                    </div>
                    <div>
                        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Журнал</p>
                        <p id="detail-logname" class="text-sm text-gray-800"></p>
                    </div>
                </div>
                <div class="mt-5 pt-4 border-t border-gray-200">
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Полное сообщение</p>
                    <p id="detail-message" class="text-sm text-gray-800 bg-gray-50 rounded-lg p-3 border border-gray-200 whitespace-pre-wrap break-words"></p>
                </div>
            </div>
            <div class="px-6 py-3 border-t border-gray-200 flex justify-end bg-gray-50 rounded-b-xl">
                <button id="detailCloseBtn" class="px-4 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
