<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEACON — Панель мониторинга</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        html, body { overflow-x: auto; overflow-y: auto; min-height: 100vh; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #dc3545; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #bb2d3b; }

        .main-wrapper { max-width: 1600px; margin: 0 auto; padding: 0 15px; width: 100%; }
        .filter-scroll { overflow-x: auto; overflow-y: visible; }

        #status-indicator {
            display: inline-block; width: 14px; height: 14px; border-radius: 50%;
            background-color: #198754; margin-right: 8px;
            border: 2px solid #fff; box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        #status-indicator.offline { background-color: #dc3545; }

        #error-wrapper { border: 1px solid #dee2e6; border-radius: 6px; margin-bottom: 1rem; overflow: hidden; }
        #error-header { background-color: #e9ecef; padding: 8px 15px; border-bottom: 1px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; }
        #error-container {
            background-color: #f8f9fa; min-height: 60px; max-height: 200px;
            overflow-y: auto; overflow-x: auto; padding: 10px;
            font-family: 'Courier New', Courier, monospace; font-size: 0.9rem; position: relative;
        }
        #error-container .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; color: #6c757d; font-weight: 500; position: absolute; top: 0; left: 0; }
        #error-container.has-errors .empty-state { display: none; }
        #error-container .error-line { padding: 2px 0; color: #dc3545; border-bottom: 1px solid #eee; }
        #error-container .error-line:last-child { border-bottom: none; }
        .error-time { color: #495057; font-weight: bold; }

        .action-buttons { display: flex; gap: 10px; width: 100%; }
        @media (min-width: 768px) { .action-buttons { flex-wrap: nowrap; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-['Inter',system-ui,sans-serif']">

    <div class="max-w-[1400px] mx-auto px-4 py-5">

        <!-- ===== HEADER ===== -->
        <header class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <svg class="w-9 h-9 text-red-600" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18l6 3.16v6.32l-6 3.16-6-3.16V7.34l6-3.16z"/>
                    <path d="M11 10h2v5h-2zm0-3h2v2h-2z"/>
                </svg>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">BEACON</h1>
            </div>
            <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200">
                <span class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_6px_rgba(16,185,129,0.6)]"></span>
                <span class="text-sm font-medium text-gray-700">Статус: <span class="text-emerald-600">Онлайн</span></span>
            </div>
        </header>

        <!-- ===== METRIC CARDS ===== -->
        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="rounded-lg p-5 text-white bg-blue-600 shadow-md">
                <p class="text-sm font-medium opacity-90 mb-1">Всего записей</p>
                <p class="text-4xl font-bold" id="stat-total">0</p>
            </div>
            <div class="rounded-lg p-5 text-white bg-red-600 shadow-md">
                <p class="text-sm font-medium opacity-90 mb-1">Ошибки</p>
                <p class="text-4xl font-bold" id="stat-errors">0</p>
            </div>
            <div class="rounded-lg p-5 text-white bg-yellow-500 shadow-md">
                <p class="text-sm font-medium opacity-90 mb-1">Предупреждения</p>
                <p class="text-4xl font-bold" id="stat-warnings">0</p>
            </div>
            <div class="rounded-lg p-5 text-white bg-emerald-700 shadow-md">
                <p class="text-sm font-medium opacity-90 mb-1">Информация</p>
                <p class="text-4xl font-bold" id="stat-information">0</p>
            </div>
        </section>

        <!-- ===== FILTER PANEL ===== -->
        <section class="bg-white border border-gray-200 rounded-lg p-5 shadow-sm mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-x-4 gap-y-4 items-end">

                <div>
                    <label for="eventTypeFilter" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Тип события:</label>
                    <select id="eventTypeFilter" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white">
                        <option value="">Все</option>
                    </select>
                </div>

                <div>
                    <label for="sourceFilter" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Источник:</label>
                    <select id="sourceFilter" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white">
                        <option value="">Все</option>
                    </select>
                </div>

                <div>
                    <label for="logNameFilter" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Журнал:</label>
                    <select id="logNameFilter" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white">
                        <option value="">Все</option>
                        <option value="Application">Application</option>
                        <option value="System">System</option>
                        <option value="Security">Security</option>
                    </select>
                </div>

                <div>
                    <label for="searchFilter" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Поиск по сообщению:</label>
                    <input type="text" id="searchFilter" placeholder="Введите текст..." class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400">
                </div>

                <div>
                    <label for="sortOrder" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Порядок:</label>
                    <select id="sortOrder" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 bg-white">
                        <option value="desc">Новые</option>
                        <option value="asc">Старые</option>
                    </select>
                </div>

            </div>

            <div class="flex flex-wrap items-center justify-between mt-4 gap-3">
                <div class="flex items-center gap-3">
                    <button id="applyFilters" class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-5 py-2 rounded-md transition-colors">Применить</button>
                    <button id="refreshBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-600 border border-gray-300 px-3 py-2 rounded-md transition-colors" title="Обновить">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 9a9 9 0 0116.2-4.2M20 15a9 9 0 01-16.2 4.2"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="flex flex-wrap items-center justify-between mt-4 gap-3">
                <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer select-none">
                    <input type="checkbox" id="autoUpdate" class="rounded border-gray-300 text-blue-600 focus:ring-blue-400">
                    Автообновление (каждые 15 сек)
                </label>
                <button id="exportCsvBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium px-4 py-2 rounded-md transition-colors inline-flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m0 0l-4-4m4 4l4-4"/>
                    </svg>
                    Экспорт в CSV
                </button>
            </div>
        </section>

        <!-- ===== TABLE ===== -->
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-rose-100">
                        <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200">ID</th>
                        <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200">Время</th>
                        <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200">Тип события</th>
                        <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200">Уровень</th>
                        <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200">Компьютер</th>
                        <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200">Источник</th>
                        <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200">Журнал</th>
                        <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider border-b border-rose-200">Сообщение</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="bg-gray-50 border-b border-gray-200">
                        <td colspan="8" class="px-3 py-2">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-2 text-sm text-gray-500">
                                    <span class="w-2 h-2 rounded-full bg-red-500 inline-block"></span>
                                    <span>Журнал системных ошибок</span>
                                </div>
                                <button id="clearBtn" class="text-xs text-red-600 border border-red-400 rounded px-3 py-1 hover:bg-red-50 transition-colors">Очистить</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
                <tbody id="logs-table-body">
                    <tr>
                        <td colspan="8" class="px-3 py-16 text-center">
                            <p class="text-gray-400 text-sm">Нет ошибок</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- ===== FOOTER / PAGINATION ===== -->
        <div class="flex flex-wrap items-center justify-end gap-4 mt-4">
            <div class="flex items-center gap-2 text-sm text-gray-600">
                <span>Показывать по:</span>
                <select id="pageSizeSelect" class="border border-gray-300 rounded-md px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
            <nav class="flex items-center gap-1" id="pagination-controls">
                <!-- пагинация рендерится JS -->
            </nav>
        </div>

    </div>

    <!-- Модальное окно -->
    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Детали события <span id="modal-id" class="ms-2 badge bg-light text-dark"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-6"><strong>Время:</strong> <span id="modal-time"></span></div>
                        <div class="col-6"><strong>Компьютер:</strong> <span id="modal-computer"></span></div>
                        <div class="col-6"><strong>Тип события:</strong> <span id="modal-type"></span></div>
                        <div class="col-6"><strong>Уровень:</strong> <span id="modal-level"></span></div>
                        <div class="col-6"><strong>Источник:</strong> <span id="modal-source"></span></div>
                        <div class="col-6"><strong>Журнал:</strong> <span id="modal-logname"></span></div>
                        <div class="col-12 mt-3">
                            <hr>
                            <strong>Полное сообщение:</strong>
                            <p id="modal-message" class="p-3 bg-light rounded border mt-2"></p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
