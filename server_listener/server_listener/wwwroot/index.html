<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель мониторинга системных логов</title>
    
    <!-- ФАВИКОН: Подключаем прозрачный PNG -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Стили для скроллов и прозрачного окошка ошибок -->
    <style>
        /* Разрешаем горизонтальную прокрутку всей странице */
        html, body {
            overflow-x: auto;
            overflow-y: auto;
            min-height: 100vh;
        }

        /* Панель фильтров будет скроллиться по горизонтали при необходимости */
        .filter-scroll {
            overflow-x: auto;
            overflow-y: visible;
        }

        /* Стилизация полосы прокрутки (красные, под стиль сайта) */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #dc3545; 
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bb2d3b; 
        }

        /* Прозрачный контейнер для будущих ошибок */
        #error-container {
            max-height: 150px;      /* Максимальная высота, если будут ошибки */
            overflow-y: auto;       /* Скролл появится только когда появятся ошибки */
            overflow-x: auto;
            background: transparent;/* Полностью прозрачный фон */
            border: none;           /* Без рамки */
            color: #dc3545;         /* Текст ошибок будет красным, если выведете через JS */
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-all;
            padding: 0;             /* Убираем отступы, чтобы блок не занимал лишнего места */
        }
    </style>
</head>
<body>
    <div class="container-fluid mt-4">
        
        <!-- Блок только с логотипом (заголовок убран, высота 80px) -->
        <div class="mb-4">
            <img src="logo_full.png" alt="Beacon Logo" style="height: 80px; width: auto;">
        </div>

        <!-- Панель фильтров -->
        <div class="card bg-light p-3 mb-4 filter-scroll">
            <div class="row g-3 align-items-end" style="min-width: 600px;">
                <div class="col-md-2">
                    <label for="eventTypeFilter" class="form-label">Тип события:</label>
                    <select id="eventTypeFilter" class="form-select">
                        <option value="">Все</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="sourceFilter" class="form-label">Источник:</label>
                    <select id="sourceFilter" class="form-select">
                        <option value="">Все</option>
                    </select>
                </div>
                <div class="col-md-2">
                     <label for="logNameFilter" class="form-label">Журнал:</label>
                    <select id="logNameFilter" class="form-select">
                        <option value="">Все</option>
                        <option value="Application">Application</option>
                        <option value="System">System</option>
                        <option value="Security">Security</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="searchFilter" class="form-label">Поиск по сообщению:</label>
                    <input type="text" id="searchFilter" class="form-control" placeholder="Введите текст...">
                </div>
                <div class="col-md-1">
                    <label for="sortOrder" class="form-label">Сортировка:</label>
                    <select id="sortOrder" class="form-select">
                        <option value="desc">Новые</option>
                        <option value="asc">Старые</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button id="applyFilters" class="btn btn-danger w-100">Применить</button>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="autoUpdate">
                        <label class="form-check-label" for="autoUpdate">
                            Автообновление (каждые 15 секунд)
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Таблица с логами -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover table-sm">
                <thead class="table-danger">
                    <tr>
                        <th style="width: 5%;">ID</th>
                        <th style="width: 15%;">Время</th>
                        <th style="width: 10%;">Тип события</th>
                        <th style="width: 10%;">Уровень</th>
                        <th style="width: 10%;">Компьютер</th>
                        <th style="width: 15%;">Источник</th>
                        <th style="width: 10%;">Журнал</th>
                        <th>Сообщение</th>
                    </tr>
                </thead>
                <tbody id="logs-table-body">
                    <!-- Данные будут загружены сюда -->
                </tbody>
            </table>
        </div>

        <!-- НОВОЕ: Прозрачное пустое окошко для ошибок (теперь ПОД таблицей) -->
        <div id="error-container" class="mb-3"></div>
        
        <!-- Пагинация -->
        <nav>
            <ul class="pagination" id="pagination-controls">
                <!-- Элементы пагинации -->
            </ul>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
