<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель мониторинга ошибок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid mt-4">
        <h1 class="mb-4">Панель мониторинга ошибок Windows</h1>
        
        <div class="row mb-3">
            <div class="col-md-3">
                <label for="logNameFilter" class="form-label">Фильтр по журналу:</label>
                <select id="logNameFilter" class="form-select">
                    <option value="">Все</option>
                    <option value="Application">Application</option>
                    <option value="System">System</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="sortOrder" class="form-label">Сортировка по времени:</label>
                <select id="sortOrder" class="form-select">
                    <option value="desc">Сначала новые</option>
                    <option value="asc">Сначала старые</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Время</th>
                        <th>Компьютер</th>
                        <th>Источник</th>
                        <th>Журнал</th>
                        <th>Сообщение</th>
                    </tr>
                </thead>
                <tbody id="logs-table-body">
                    <!-- Данные будут загружены сюда -->
                </tbody>
            </table>
        </div>
        
        <nav>
            <ul class="pagination" id="pagination-controls">
                <!-- Элементы пагинации -->
            </ul>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
