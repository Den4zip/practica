<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель мониторинга логов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid mt-4">
        <h1 class="mb-4">Панель мониторинга логов</h1>
        
        <div class="card bg-light p-3 mb-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-2">
                    <label for="logNameFilter" class="form-label">Журнал:</label>
                    <select id="logNameFilter" class="form-select">
                        <option value="">Все</option>
                        <option value="Application">Application</option>
                        <option value="System">System</option>
                        <option value="Security">Security</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="sourceFilter" class="form-label">Источник:</label>
                    <select id="sourceFilter" class="form-select">
                        <option value="">Все</option>
                        <!-- Опции будут загружены динамически -->
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="searchFilter" class="form-label">Поиск по сообщению:</label>
                    <input type="text" id="searchFilter" class="form-control" placeholder="Введите текст...">
                </div>
                <div class="col-md-2">
                    <label for="sortOrder" class="form-label">Сортировка:</label>
                    <select id="sortOrder" class="form-select">
                        <option value="desc">Сначала новые</option>
                        <option value="asc">Сначала старые</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button id="applyFilters" class="btn btn-primary w-100">Применить</button>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="autoUpdate">
                        <label class="form-check-label" for="autoUpdate">
                            Автообновление (каждые 15 секунд)
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover table-sm">
                <thead class="table-dark">
                    <tr>
                        <th style="width: 5%;">ID</th>
                        <th style="width: 15%;">Время</th>
                        <th style="width: 10%;">Уровень</th>
                        <th style="width: 10%;">Компьютер</th>
                        <th style="width: 15%;">Источник</th>
                        <th style="width: 10%;">Журнал</th>
                        <th>Сообщение</th>
                    </tr>
                </thead>
                <tbody id="logs-table-body">
                    <!-- Данные будут загружены сюда -->
                </tbody>
            </table>
        </div>
        
        <nav>
            <ul class="pagination" id="pagination-controls">
                <!-- Элементы пагинации -->
            </ul>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
